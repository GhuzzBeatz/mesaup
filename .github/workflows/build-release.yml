name: Build & Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Versao exata (ex: 2.0.0). Vazio incrementa patch."
        required: false
        type: string
      release_notes:
        description: "Notas exibidas dentro do aplicativo."
        required: false
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: build-release-mesaup
  cancel-in-progress: false

env:
  WHATSAPP_ALERT_PHONE: "5511948981459"
  PRODUCT_NAME: "MesaUp"

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync default branch
        shell: pwsh
        run: |
          $branch = "${{ github.event.repository.default_branch }}"
          if ([string]::IsNullOrWhiteSpace($branch)) { $branch = "master" }
          git fetch origin $branch
          git checkout $branch
          git pull --ff-only origin $branch
          "DEFAULT_BRANCH=$branch" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set release version
        shell: pwsh
        env:
          REQUESTED_VERSION: ${{ inputs.release_version }}
          REQUESTED_NOTES: ${{ inputs.release_notes }}
        run: |
          $requested = $env:REQUESTED_VERSION
          if ([string]::IsNullOrWhiteSpace($requested)) {
            npm version patch --no-git-tag-version
          } else {
            npm version $requested --no-git-tag-version --allow-same-version
          }
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          "APP_VERSION=$($pkg.version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $notes = $env:REQUESTED_NOTES
          if ([string]::IsNullOrWhiteSpace($notes)) { $notes = "${{ env.PRODUCT_NAME }} v$($pkg.version) - nova versao disponivel." }
          "RELEASE_NOTES=$notes" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build setup
        run: npm run build -- --publish never

      - name: Rename setup to static name
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist_installer -File -Recurse |
            Where-Object { $_.Name -like '*.exe' -and $_.Name -notlike '*.blockmap' -and $_.Name -like '*Setup*' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $setup) {
            $setup = Get-ChildItem dist_installer -File -Recurse |
              Where-Object { $_.Name -like '*.exe' -and $_.Name -notlike '*.blockmap' } |
              Sort-Object Length -Descending |
              Select-Object -First 1
          }

          if (-not $setup) { throw 'Setup .exe nao encontrado em dist_installer.' }

          $staticName = "${{ env.PRODUCT_NAME }}.Setup.exe"
          $staticPath = Join-Path $setup.DirectoryName $staticName
          Copy-Item $setup.FullName $staticPath -Force
          $setupSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $staticPath).Hash.ToLowerInvariant()

          "SETUP_NAME=$staticName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SETUP_PATH=$staticPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SETUP_SHA256=$setupSha256" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SETUP_ORIGINAL=$($setup.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create release with static asset name
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: ${{ env.PRODUCT_NAME }} v${{ env.APP_VERSION }}
          body: |
            ${{ env.PRODUCT_NAME }} v${{ env.APP_VERSION }}
            ${{ env.RELEASE_NOTES }}
            Download: [${{ env.SETUP_NAME }}](https://github.com/${{ github.repository }}/releases/latest/download/${{ env.SETUP_NAME }})
          files: |
            ${{ env.SETUP_PATH }}
          overwrite_files: true
          make_latest: true

      - name: Update manifest
        shell: pwsh
        run: |
          $manifest = @{
            version = $env:APP_VERSION
            download_url = "https://github.com/${{ github.repository }}/releases/latest/download/$env:SETUP_NAME"
            sha256 = $env:SETUP_SHA256
            notes = $env:RELEASE_NOTES
          } | ConvertTo-Json -Depth 3
          [System.IO.File]::WriteAllText("update-manifest.json", $manifest, (New-Object System.Text.UTF8Encoding $false))

      - name: Commit and push
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json update-manifest.json
          if (-not (git diff --cached --quiet)) {
            git commit -m "chore(release): v$env:APP_VERSION [skip ci]"
            git push origin "HEAD:$env:DEFAULT_BRANCH"
          }

  notify-whatsapp:
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ always() && needs.build-release.result != 'cancelled' }}
    env:
      WHATSAPP_ALERT_APIKEY: ${{ secrets.WHATSAPP_ALERT_APIKEY }}
      WORKFLOW_RESULT: ${{ needs.build-release.result }}

    steps:
      - name: Skip when API key is missing
        if: ${{ env.WHATSAPP_ALERT_APIKEY == '' }}
        run: echo "WHATSAPP_ALERT_APIKEY nao configurado."

      - name: Send WhatsApp alert
        if: ${{ env.WHATSAPP_ALERT_APIKEY != '' }}
        shell: bash
        run: |
          if [ "$WORKFLOW_RESULT" = "success" ]; then
            TEXT="[SUCESSO] ${{ env.PRODUCT_NAME }}: build e release concluidos. Run: #${{ github.run_number }}"
          else
            TEXT="[ERRO] ${{ env.PRODUCT_NAME }}: falha no build. Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -fsS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${{ env.WHATSAPP_ALERT_PHONE }}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "apikey=${WHATSAPP_ALERT_APIKEY}"
