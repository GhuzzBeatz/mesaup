<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/util.js"></script>
</head>
<body>
<div class="page-wrap">
  <div class="page-header">
    <div>
      <div class="page-title">Mesas</div>
      <div class="page-sub">Clique em uma mesa livre para abrir comanda</div>
    </div>
    <button class="btn btn-primary" onclick="abrirModalMesa()">+ Nova Mesa</button>
  </div>

  <div class="sec-card">
    <div class="sec-head">
      Mapa de Mesas
      <div style="display:flex;gap:12px;font-size:11px;font-weight:600">
        <span style="color:var(--green)">Livre</span>
        <span style="color:var(--orange)">Ocupada</span>
      </div>
    </div>
    <div class="mesas-grid" id="gridMesas">
      <div class="empty">Carregando mesas...</div>
    </div>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-top">
      <span class="tbl-title">Mesas Cadastradas</span>
      <span class="tbl-count" id="count"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>No Mesa</th>
          <th>Capacidade</th>
          <th style="text-align:center">Status</th>
          <th style="text-align:center">Acoes</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="aviso av-ok" id="avisoOk"></div>
  <div class="aviso av-erro" id="avisoErro"></div>
</div>

<div class="modal-ov" id="modalMesa" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box">
    <div class="modal-title" id="modalMesaTitulo">Nova Mesa</div>
    <input type="hidden" id="mesaEditId">
    <div class="form-row">
      <div class="form-group fg1">
        <label class="form-label">Numero da Mesa *</label>
        <input id="mesaNum" placeholder="Ex: 1, 2, 3..." type="number" min="1">
      </div>
      <div class="form-group fg1">
        <label class="form-label">Capacidade</label>
        <input id="mesaCap" placeholder="4" type="number" min="1" value="4">
      </div>
    </div>
    <div class="modal-acts">
      <button class="btn btn-ghost" onclick="document.getElementById('modalMesa').style.display='none'">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarMesa()">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-ov" id="modalComanda" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal-box">
    <div class="modal-title" id="modalComandaTitulo">Abrir Comanda</div>
    <input type="hidden" id="comandaMesaId">

    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Nome do Cliente (opcional)</label>
        <input id="comandaCliente" placeholder="Opcional - pode abrir a mesa sem nome">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Garcom / Atendente (opcional)</label>
        <input id="comandaGarcom" placeholder="Nome do garcom...">
      </div>
    </div>

    <div class="modal-acts">
      <button class="btn btn-ghost" onclick="document.getElementById('modalComanda').style.display='none'">Cancelar</button>
      <button class="btn btn-primary" onclick="abrirComanda()">Abrir Comanda</button>
    </div>
  </div>
</div>

<script>
aplicarTemaAtual()
const { listarMesas, getMesa, inserirMesa, atualizarMesa, deletarMesa, inserirComanda, listarComandas } = require('../js/db.js')

function render() {
  const lista = listarMesas()
  document.getElementById('count').textContent = lista.length + ' mesa(s)'

  const grid = document.getElementById('gridMesas')
  grid.innerHTML = lista.length ? lista.map(m => {
    const comanda = listarComandas({ status: 'aberta', mesa_id: m.id })[0]
    return `<div class="mesa-card ${m.status}" onclick="clicouMesa(${m.id})">
      <div class="mesa-num">Mesa ${m.numero}</div>
      <div class="mesa-status">${m.status === 'ocupada' ? 'OCUPADA' : 'LIVRE'}</div>
      ${comanda ? `<div class="mesa-total">${fmtMoeda(comanda.total || 0)}</div>` : ''}
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${m.capacidade} lugares</div>
    </div>`
  }).join('')
  : '<div class="empty" style="padding:40px">Nenhuma mesa cadastrada. Clique em + Nova Mesa.</div>'

  document.getElementById('tbody').innerHTML = lista.length ? lista.map(m => `
    <tr>
      <td><b style="color:var(--fg)">Mesa ${m.numero}</b></td>
      <td>${m.capacidade} pessoas</td>
      <td style="text-align:center"><span class="badge ${m.status === 'ocupada' ? 'b-orange' : 'b-green'}">${m.status}</span></td>
      <td style="text-align:center;white-space:nowrap">
        <button class="btn-edit" onclick="editarMesa(${m.id})">Editar</button>
        <button class="btn-danger" onclick="excluirMesa(${m.id})">Excluir</button>
      </td>
    </tr>`).join('')
  : '<tr><td colspan="4" class="empty">Nenhuma mesa cadastrada.</td></tr>'
}

function clicouMesa(id) {
  const m = getMesa(id)
  if (!m) return

  if (m.status === 'ocupada') {
    window.parent.document.getElementById('frame').src = `pages/comandas.html?mesa_id=${id}`
    window.parent.document.querySelectorAll('.nav-btn').forEach(b => {
      if (b.textContent.includes('Comandas')) b.classList.add('active')
      else b.classList.remove('active')
    })
  } else {
    document.getElementById('comandaMesaId').value = id
    document.getElementById('modalComandaTitulo').textContent = `Abrir Comanda - Mesa ${m.numero}`
    document.getElementById('comandaCliente').value = ''
    document.getElementById('comandaGarcom').value = ''
    document.getElementById('modalComanda').style.display = 'flex'
  }
}

function abrirComanda() {
  const mesaId = Number(document.getElementById('comandaMesaId').value)
  const consumidor = document.getElementById('comandaCliente').value.trim()
  const garcom = document.getElementById('comandaGarcom').value.trim()
  const m = getMesa(mesaId)

  if (!m) return

  inserirComanda({ mesa_id: mesaId, mesa_num: m.numero, consumidor, garcom })
  document.getElementById('modalComanda').style.display = 'none'
  window.parent.document.getElementById('frame').src = `pages/comandas.html?mesa_id=${mesaId}`
  window.parent.document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.textContent.includes('Comandas')) b.classList.add('active')
    else b.classList.remove('active')
  })
  aviso('ok', `Comanda aberta para Mesa ${m.numero}!`)
  render()
}

function abrirModalMesa() {
  document.getElementById('mesaEditId').value = ''
  document.getElementById('mesaNum').value = ''
  document.getElementById('mesaCap').value = '4'
  document.getElementById('modalMesaTitulo').textContent = 'Nova Mesa'
  document.getElementById('modalMesa').style.display = 'flex'
}

function editarMesa(id) {
  const m = getMesa(id)
  if (!m) return

  document.getElementById('mesaEditId').value = id
  document.getElementById('mesaNum').value = m.numero
  document.getElementById('mesaCap').value = m.capacidade || 4
  document.getElementById('modalMesaTitulo').textContent = 'Editar Mesa'
  document.getElementById('modalMesa').style.display = 'flex'
}

function salvarMesa() {
  const num = document.getElementById('mesaNum').value.trim()
  const cap = Number(document.getElementById('mesaCap').value || 4)
  if (!num) return avisoModal('Informe o numero da mesa.')

  const editId = document.getElementById('mesaEditId').value
  let resultado
  if (editId) {
    resultado = atualizarMesa({ id: Number(editId), numero: num, capacidade: cap })
  } else {
    resultado = inserirMesa({ numero: num, capacidade: cap })
  }
  if (resultado && resultado.ok === false) return avisoModal(resultado.erro)

  document.getElementById('modalMesa').style.display = 'none'
  aviso('ok', `Mesa ${num} salva!`)
  render()
}

function excluirMesa(id) {
  const m = getMesa(id)
  if (!m) return
  if (m.status === 'ocupada') return avisoModal('Nao e possivel excluir uma mesa com comanda aberta.')

  confirmar(`Excluir Mesa ${m.numero}?`, ok => {
    if (ok) {
      deletarMesa(id)
      render()
    }
  })
}

render()
</script>
</body>
</html>
